services:
  backend:
    build:
      context: ./backend
    container_name: backend
    restart: unless-stopped
    expose:
      - "8080"
    volumes:
      - ./backend:/app
    networks:
      - backend-net

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80" 
    depends_on:
      - backend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - backend-net

networks:
  backend-net:
    driver: bridge